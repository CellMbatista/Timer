<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temporizador — Cellera Farma</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #4c546f;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    user-select: none;
  }



  /* Logo */
  .logo {
    margin-bottom: 2.5rem;
  }
  .logo img {
    height: 90px;
    width: auto;
  }

  /* Timer */
  #timer {
    font-size: clamp(5rem, 18vw, 9rem);
    font-weight: 400;
    letter-spacing: 0.06em;
    color: #ffffff;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    transition: color 0.4s;
  }
  #timer.negative { color: #ff6b6b; }

  /* Status */
  #status {
    margin-top: 1.2rem;
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    color: #ffe14d;
    height: 1.2rem;
    transition: color 0.4s;
  }
  #status.negative { color: #ff6b6b; }

  /* Buttons */
  .controls {
    display: flex;
    gap: 0.9rem;
    margin-top: 3rem;
  }
  button {
    background: transparent;
    border: 0.5px solid rgba(255,255,255,0.25);
    color: #ffffff;
    border-radius: 8px;
    padding: 0.6rem 1.5rem;
    font-size: 1rem;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    outline: none;
  }
  button:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.45); }
  button:active { background: rgba(255,255,255,0.14); }

  #btn-toggle {
    background: #1e56a8;
    border-color: #1e56a8;
    min-width: 130px;
  }
  #btn-toggle:hover { background: #2563bb; border-color: #2563bb; }

  #btn-add {
    border-color: rgba(255,225,77,0.45);
    color: #ffe14d;
  }
  #btn-add:hover { background: rgba(255,225,77,0.1); border-color: rgba(255,225,77,0.7); }

  #btn-reset {
    color: rgba(255,255,255,0.5);
    border-color: rgba(255,255,255,0.15);
    font-size: 0.85rem;
    padding: 0.6rem 1rem;
  }
  #btn-reset:hover { color: #fff; border-color: rgba(255,255,255,0.35); }

  /* Keyboard hint */
  .hint {
    margin-top: 2.5rem;
    font-size: 0.72rem;
    color: rgba(255,255,255,0.28);
    letter-spacing: 0.06em;
    text-align: center;
    line-height: 1.8;
  }
  kbd {
    display: inline-block;
    background: rgba(255,255,255,0.1);
    border: 0.5px solid rgba(255,255,255,0.2);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: inherit;
    font-size: 0.7rem;
  }
</style>
</head>

<div id="timer">00:00</div>
<div id="status">PAUSADO</div>

<div class="controls">
  <button id="btn-add" onclick="addTime(300)">+5 min</button>
  <button id="btn-toggle" onclick="togglePause()">▶ Iniciar</button>
  <button id="btn-reset" onclick="resetTimer()">Reset</button>
</div>

<p class="hint">
  <kbd>1</kbd> +5 min &nbsp;·&nbsp; <kbd>Espaço</kbd> pausar / retomar &nbsp;·&nbsp; <kbd>R</kbd> reset
</p>

<script>
  let totalSeconds = 0;
  let running = false;
  let interval = null;

  const timerEl = document.getElementById('timer');
  const statusEl = document.getElementById('status');
  const toggleBtn = document.getElementById('btn-toggle');

  function fmt(s) {
    const neg = s < 0;
    const abs = Math.abs(s);
    const m = Math.floor(abs / 60);
    const sec = abs % 60;
    return (neg ? '-' : '') + String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
  }

  function render() {
    timerEl.textContent = fmt(totalSeconds);
    const isNeg = totalSeconds < 0;
    timerEl.classList.toggle('negative', isNeg);
    statusEl.classList.toggle('negative', isNeg);
  }

  function tick() {
    totalSeconds--;
    render();
  }

  function togglePause() {
    if (running) {
      clearInterval(interval);
      running = false;
      statusEl.textContent = 'PAUSADO';
      toggleBtn.textContent = '▶ Retomar';
      toggleBtn.style.background = '#1e56a8';
      toggleBtn.style.borderColor = '#1e56a8';
    } else {
      interval = setInterval(tick, 1000);
      running = true;
      statusEl.textContent = 'EM ANDAMENTO';
      toggleBtn.textContent = '⏸ Pausar';
      toggleBtn.style.background = '#4c546f';
      toggleBtn.style.borderColor = 'rgba(255,255,255,0.3)';
    }
  }

  function addTime(s) {
    totalSeconds += s;
    render();
  }

  function resetTimer() {
    clearInterval(interval);
    running = false;
    totalSeconds = 0;
    statusEl.textContent = 'PAUSADO';
    statusEl.classList.remove('negative');
    toggleBtn.textContent = '▶ Iniciar';
    toggleBtn.style.background = '#1e56a8';
    toggleBtn.style.borderColor = '#1e56a8';
    render();
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === '1') { e.preventDefault(); addTime(300); }
    if (e.key === ' ')  { e.preventDefault(); togglePause(); }
    if (e.key === 'r' || e.key === 'R') { resetTimer(); }
  });

  render();
</script>
